# Workflow ini secara otomatis mengkompilasi, menguji, dan menganalisis kode dengan SonarCloud
# Dijalankan setiap kali ada push atau pull request ke branch main
# Membantu mencegah: error kompilasi, kegagalan unit test, dan masalah kualitas kode

name: Build, Test & SonarCloud Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]

jobs:
  build-and-test:
    name: Compile, Test, Coverage & SonarCloud
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout kode dari repository (full history untuk SonarCloud blame)
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Setup JDK 17 (diperlukan oleh SonarCloud scanner)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # Step 3: Cache SonarCloud packages (mempercepat analisis)
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # Step 4: Cache Maven packages (mempercepat build)
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # Step 5: Validasi pom.xml (mencegah error konfigurasi Maven)
      - name: Validate Maven Project
        run: mvn -B validate --file pom.xml

      # Step 6: Kompilasi source code (cepat mendeteksi error sintaks/kompilasi)
      - name: Compile Source Code
        run: mvn -B compile --file pom.xml

      # Step 7: Jalankan JUnit Test + generate laporan JaCoCo coverage
      - name: Run JUnit Tests & Generate Coverage Report
        run: mvn -B test --file pom.xml

      # Step 8: Upload hasil laporan JUnit (tersedia meskipun test gagal)
      - name: Upload JUnit Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-test-results
          path: target/surefire-reports/
          retention-days: 7

      # Step 9: Upload laporan JaCoCo coverage
      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 7

      # Step 10: Build & Analisis SonarCloud (cara resmi dari SonarCloud)
      - name: Build and Analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -DskipTests -Dsonar.projectKey=ariqhisyam_ci-cd-mkpl-task

      # Step 11: Upload file JAR hasil build sebagai artifact
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-jar
          path: target/*.jar
          retention-days: 7
