# Workflow ini secara otomatis mengkompilasi, menguji, dan menganalisis kode dengan SonarCloud
# Dijalankan setiap kali ada push atau pull request ke branch main
# Membantu mencegah: error kompilasi, kegagalan unit test, dan masalah kualitas kode

name: Build, Test & SonarCloud Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Compile, Test, Coverage & SonarCloud
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout kode dari repository
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          # Fetch semua history agar SonarCloud bisa menganalisis blame info
          fetch-depth: 0

      # Step 2: Setup JDK 17 (diperlukan oleh SonarCloud scanner)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Step 3: Validasi pom.xml (mencegah error konfigurasi Maven)
      - name: Validate Maven Project
        run: mvn -B validate --file pom.xml

      # Step 4: Kompilasi source code (cepat mendeteksi error sintaks/kompilasi)
      - name: Compile Source Code
        run: mvn -B compile --file pom.xml

      # Step 5: Kompilasi test code (memastikan kode test juga bisa dikompilasi)
      - name: Compile Test Code
        run: mvn -B test-compile --file pom.xml

      # Step 6: Jalankan JUnit Test + generate laporan JaCoCo coverage
      - name: Run JUnit Tests & Generate Coverage Report
        run: mvn -B test --file pom.xml

      # Step 7: Upload hasil laporan JUnit (tersedia meskipun test gagal)
      - name: Upload JUnit Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-test-results
          path: target/surefire-reports/
          retention-days: 7

      # Step 8: Upload laporan JaCoCo coverage
      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 7

      # Step 9: Analisis kualitas kode dengan SonarCloud
      - name: SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify sonar:sonar \
            -DskipTests \
            -Dsonar.projectKey=ariqhisyam_ci-cd-mkpl-task \
            -Dsonar.organization=ariqhisyam \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      # Step 10: Package project menjadi JAR (hanya jika semua test lulus)
      - name: Package Project (JAR)
        run: mvn -B package -DskipTests --file pom.xml

      # Step 11: Upload file JAR hasil build sebagai artifact
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-jar
          path: target/*.jar
          retention-days: 7
