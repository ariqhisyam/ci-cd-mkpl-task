# Workflow ini secara otomatis mengkompilasi dan menguji project Java dengan Maven
# Dijalankan setiap kali ada push atau pull request ke branch main
# Membantu mencegah: error kompilasi, kegagalan unit test, dan dependensi yang hilang

name: Build & Test Java Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Compile, Test & Verify
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout kode dari repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Setup JDK 11 dengan cache Maven untuk mempercepat build
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # Step 3: Validasi pom.xml (mencegah error konfigurasi Maven)
      - name: Validate Maven Project
        run: mvn -B validate --file pom.xml

      # Step 4: Kompilasi source code saja (cepat mendeteksi error sintaks/kompilasi)
      - name: Compile Source Code
        run: mvn -B compile --file pom.xml

      # Step 5: Kompilasi test code (memastikan kode test juga bisa dikompilasi)
      - name: Compile Test Code
        run: mvn -B test-compile --file pom.xml

      # Step 6: Jalankan semua JUnit Test
      - name: Run JUnit Tests
        run: mvn -B test --file pom.xml

      # Step 7: Upload hasil laporan test JUnit (tersedia meskipun test gagal)
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-test-results
          path: target/surefire-reports/
          retention-days: 7

      # Step 8: Package project menjadi JAR (hanya jika semua test lulus)
      - name: Package Project (JAR)
        run: mvn -B package -DskipTests --file pom.xml

      # Step 9: Upload file JAR hasil build sebagai artifact
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-jar
          path: target/*.jar
          retention-days: 7
