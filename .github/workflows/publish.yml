# Workflow ini mempublish artifact JAR ke GitHub Packages
# Dijalankan otomatis setiap ada push ke branch main
# Package akan muncul di halaman repository GitHub pada bagian "Packages"

name: Publish to GitHub Packages

on:
  push:
    branches: [ main ]

jobs:
  publish:
    name: Build & Publish JAR to GitHub Packages
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write  # Izin untuk menulis ke GitHub Packages

    steps:
      # Step 1: Checkout kode repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup JDK 17 (tanpa server config, kita buat settings.xml manual)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # Step 3: Cache Maven packages (mempercepat build)
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # Step 4: Buat Maven settings.xml dengan kredensial GitHub
      # Dilakukan SETELAH cache restore agar tidak tertimpa
      - name: Configure Maven settings.xml for GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        http://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      # Step 5: Build dan jalankan tests
      - name: Build and Test
        run: mvn -B test --file pom.xml

      # Step 6: Publish JAR ke GitHub Packages
      - name: Publish Package to GitHub Packages
        run: mvn -B deploy -DskipTests --file pom.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
